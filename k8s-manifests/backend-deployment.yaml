apiVersion: apps/v1
kind: Deployment
metadata:
  name: three-tier-app-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: three-tier-app-backend
  template:
    metadata:
      labels:
        app: three-tier-app-backend
    spec:
      containers:
      - name: three-tier-app-backend
        image: surajmane121045/three_tier_app_backend:ffb61c71e2c102331af734603a5039aa74268420
        ports:
        - containerPort: 8080
        env:
          - name: MONGO_URL
            value: "mongodb://three-tier-app-mongo:27017"
